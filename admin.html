<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 — 数字土壤 WebGIS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .admin-header h2 { color: var(--primary-dark); font-size: 20px; }
        .admin-header .back-link { color: var(--primary); text-decoration: none; font-size: 13px; }
        .table-container { overflow-x: auto; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .search-box { margin-bottom: 16px; }
        .search-box input { width: 100%; max-width: 320px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; outline: none; }
        .search-box input:focus { border-color: var(--primary-light); }
        .admin-table .actions { white-space: nowrap; }
        .admin-table .actions button { margin-right: 4px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <div>
            <h2>👥 用户管理</h2>
            <a href="/fjsoil.html" class="back-link">← 返回地图</a>
        </div>
        <div>
            <span id="currentUserInfo" style="font-size:13px;color:var(--text-light);margin-right:16px;"></span>
            <button class="btn btn-primary" onclick="openAddModal()">+ 新增用户</button>
            <button class="btn btn-outline btn-sm" onclick="logout()" style="margin-left:8px;">退出</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 搜索用户名或真实姓名..." oninput="filterUsers()">
    </div>

    <div class="table-container">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>真实姓名</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <tr><td colspan="5"><div class="loading">加载中</div></td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- ========== 新增/编辑 模态框 ========== -->
<div class="modal-overlay" id="userModal">
    <div class="modal-box">
        <h3 id="modalTitle">新增用户</h3>
        <form id="userForm" autocomplete="off">
            <input type="hidden" id="userId">
            <div class="form-group">
                <label for="formUsername">用户名 <span style="color:red">*</span></label>
                <input type="text" id="formUsername" placeholder="请输入用户名" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="formRealName">真实姓名</label>
                <input type="text" id="formRealName" placeholder="请输入真实姓名">
            </div>
            <div class="form-group">
                <label for="formPassword">密码 <span id="pwdRequired" style="color:red">*</span></label>
                <input type="password" id="formPassword" placeholder="请输入密码" autocomplete="new-password">
                <span style="font-size:11px;color:#999;" id="pwdHint"></span>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeModal('userModal')">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script>
(function () {
    if (!requireAuth()) return;

    var user = getCurrentUser();
    if (user) {
        document.getElementById('currentUserInfo').textContent = '👤 ' + (user.realName || user.username);
    }

    loadUserTable();
})();

var allUsers = [];

// ===== 加载用户列表 =====
function loadUserTable() {
    API.getUserList().then(function (resp) {
        if (resp.code === 401) { handle401(); return; }
        if (resp.code === 200) {
            allUsers = resp.data || [];
            renderTable(allUsers);
        }
    });
}

function renderTable(users) {
    var tbody = document.getElementById('userTableBody');
    if (!users || users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">暂无用户数据</div></td></tr>';
        return;
    }
    var html = '';
    users.forEach(function (u) {
        var statusClass = u.status === 1 ? 'status-active' : 'status-disabled';
        var statusText = u.status === 1 ? '启用' : '禁用';
        var toggleText = u.status === 1 ? '禁用' : '启用';
        html += '<tr>' +
            '<td>' + u.id + '</td>' +
            '<td>' + escapeHtml(u.username) + '</td>' +
            '<td>' + escapeHtml(u.realName || '-') + '</td>' +
            '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
            '<td class="actions">' +
                '<button class="btn btn-outline btn-sm" onclick="openEditModal(' + u.id + ')">编辑</button>' +
                '<button class="btn btn-outline btn-sm" onclick="toggleStatus(' + u.id + ')">' + toggleText + '</button>' +
                '<button class="btn btn-danger btn-sm" onclick="deleteUser(' + u.id + ')">删除</button>' +
            '</td>' +
            '</tr>';
    });
    tbody.innerHTML = html;
}

function filterUsers() {
    var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!keyword) { renderTable(allUsers); return; }
    var filtered = allUsers.filter(function (u) {
        return (u.username && u.username.toLowerCase().indexOf(keyword) > -1) ||
               (u.realName && u.realName.toLowerCase().indexOf(keyword) > -1);
    });
    renderTable(filtered);
}

// ===== 新增用户 =====
function openAddModal() {
    document.getElementById('modalTitle').textContent = '新增用户';
    document.getElementById('userId').value = '';
    document.getElementById('formUsername').value = '';
    document.getElementById('formRealName').value = '';
    document.getElementById('formPassword').value = '';
    document.getElementById('pwdRequired').style.display = 'inline';
    document.getElementById('pwdHint').textContent = '';
    openModal('userModal');
}

// ===== 编辑用户 =====
function openEditModal(id) {
    var u = allUsers.find(function (item) { return item.id === id; });
    if (!u) return;
    document.getElementById('modalTitle').textContent = '编辑用户';
    document.getElementById('userId').value = u.id;
    document.getElementById('formUsername').value = u.username || '';
    document.getElementById('formRealName').value = u.realName || '';
    document.getElementById('formPassword').value = '';
    document.getElementById('pwdRequired').style.display = 'none';
    document.getElementById('pwdHint').textContent = '留空则不修改密码';
    openModal('userModal');
}

// ===== 提交表单 =====
document.getElementById('userForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var id = document.getElementById('userId').value;
    var username = document.getElementById('formUsername').value.trim();
    var realName = document.getElementById('formRealName').value.trim();
    var password = document.getElementById('formPassword').value;

    if (!username) { showToast('请输入用户名', 'error'); return; }

    var data = { username: username, realName: realName };
    if (password) data.password = password;

    var promise;
    if (id) {
        data.id = parseInt(id);
        if (!password) data.password = ''; // 空密码表示不修改
        promise = API.updateUser(data);
    } else {
        if (!password) { showToast('请输入密码', 'error'); return; }
        promise = API.addUser(data);
    }

    promise.then(function (resp) {
        if (resp.code === 200) {
            closeModal('userModal');
            showToast(resp.msg || '操作成功');
            loadUserTable();
        } else {
            showToast(resp.msg || '操作失败', 'error');
        }
    });
});

// ===== 切换状态 =====
function toggleStatus(id) {
    API.toggleUserStatus(id).then(function (resp) {
        if (resp.code === 200) {
            showToast(resp.msg);
            loadUserTable();
        } else {
            showToast(resp.msg || '操作失败', 'error');
        }
    });
}

// ===== 删除用户 =====
function deleteUser(id) {
    if (!confirm('确定要删除该用户吗？此操作不可恢复。')) return;
    API.deleteUser(id).then(function (resp) {
        if (resp.code === 200) {
            showToast('删除成功');
            loadUserTable();
        } else {
            showToast(resp.msg || '删除失败', 'error');
        }
    });
}

// ===== 工具函数 =====
function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}
</script>
</body>
</html>
